<!DOCTYPE html>
<html lang="es">
<head>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#111827">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia Institucional</title>

<style>
:root{
    --bg1:#0f2027;
    --bg2:#203a43;
    --bg3:#2c5364;
    --card-bg:#ffffff;
    --text:#203a43;
    --card-item:#f4f6f9;
    --hover-color:#5CC6D0;
}

@media (prefers-color-scheme: dark){
    :root{
        --card-bg:#1e1e1e;
        --text:#ffffff;
        --card-item:#2a2a2a;
    }
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:var(--card-bg);
    width:520px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(176, 175, 175, 0.45);
    color:var(--text);
}

.logo{
    text-align:center;
    margin-bottom:10px;
}

.logo img{
    height:60px;
}

.reloj{
    text-align:center;
    font-weight:600;
    margin-bottom:15px;
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.header h3{
    margin:6px 0;
}

.lista{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    max-height:320px;
    overflow:auto;
}

.card{
    position:relative;
    overflow:hidden;
    background:var(--card-item);
    padding:18px;
    border-radius:14px;
    text-align:center;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:background 0.3s ease, transform 0.25s ease, color 0.3s ease;
}

/* 🎨 HOVER CORREGIDO */
.card:not(.success):hover{
    background:var(--hover-color);
    color:#ffffff;
    transform:translateY(-3px);
}

.card.success{
    background:#28a745 !important;
    color:white;
}

.ripple{
    position:absolute;
    border-radius:50%;
    transform:scale(0);
    animation:ripple 600ms linear;
    background:rgba(255,255,255,0.6);
}

@keyframes ripple{
    to{
        transform:scale(4);
        opacity:0;
    }
}

.empty{
    grid-column:1 / -1;
    text-align:center;
    font-weight:bold;
    color:gray;
}

@media(max-width:600px){
    .container{width:92%;}
}
</style>
</head>
<body>

<div class="container">

    <div class="logo">
        <img src="LOGO.png" alt="Logo">
    </div>

    <div class="reloj" id="reloj"></div>

    <div class="header">
        <h3 id="curso"></h3>
        <h3 id="clase"></h3>
        <h3 id="horario"></h3>
    </div>

    <div class="lista" id="lista"></div>
</div>

</body>
</html>
