<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia Institucional</title>

<style>

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    width:500px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.45);
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.header h3{
    margin:6px 0;
    color:#203a43;
    font-weight:600;
}

.lista{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:12px;
    max-height:350px;
    overflow:auto;
}

.card{
    background:#f4f6f9;
    padding:18px;
    border-radius:14px;
    text-align:center;
    font-weight:600;
    cursor:pointer;
    transition:all 0.25s ease;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card:hover{
    transform:translateY(-3px);
    background:#2c5364;
    color:white;
}

.card:active{
    transform:scale(0.97);
}

.card.success{
    background:#28a745 !important;
    color:white;
}

.empty{
    grid-column:1 / -1;
    text-align:center;
    font-weight:bold;
    color:gray;
}

@media(max-width:520px){
    .container{
        width:90%;
    }
}

</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h3 id="curso"></h3>
        <h3 id="clase"></h3>
        <h3 id="horario"></h3>
    </div>

    <div class="lista" id="lista"></div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwuLJl7z8S4kG3_ZYNkmRKpEDB2OtzUYf1pnXWahT6JY8Pq5igyHcmEj6vzxhx9xlQmdA/exec";

async function cargarLista(){

    const res = await fetch(API_URL);
    const data = await res.json();

    document.getElementById("curso").innerText = data.curso ? "Curso: " + data.curso : "";
    document.getElementById("clase").innerText = data.clase ? "Numero deClase: " + data.clase : "";
    document.getElementById("horario").innerText = data.horario ? "Horario: " + data.horario : "";

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    if(!data.alumnos || data.alumnos.length === 0){
        lista.innerHTML = `<p class="empty">No hay alumnos habilitados en este momento</p>`;
        return;
    }

    data.alumnos.forEach(al => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerText = al.alumno;

        div.onclick = async () => {

            div.classList.add("success");
            div.innerText = "✔ Asistencia registrada";

            await fetch(API_URL,{
                method:"POST",
                body: JSON.stringify({cuenta: al.cuenta})
            });

            setTimeout(()=>{
                cargarLista();
            },800);
        };

        lista.appendChild(div);
    });
}

cargarLista();
setInterval(cargarLista,1000);

</script>

</body>
</html>
